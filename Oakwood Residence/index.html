<!DOCTYPE html>
<html>
<head>
  <title>Oakwood Residence Saigon</title>
  <meta charset="utf-8">
  <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui" />
  <style>@-ms-viewport { width: device-width; }</style>
  <link rel="stylesheet" href="vendor/reset.min.css">
  <link rel="stylesheet" href="style.css">

  <style>
    /* Collapsible Menu Styles */
    #sceneList {
      position: absolute;
      top: 50px;
      left: 0;
      width: 250px;
      max-height: 90vh;
      overflow-y: auto;
      background: #2a2f36;
      color: white;
      padding: 10px;
      border-radius: 10px;
      font-family: sans-serif;
      z-index: 10;
    }

    .menu-header {
      cursor: pointer;
      font-weight: bold;
      padding: 10px;
      margin-top: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    .menu-header:hover { background: rgba(255,255,255,0.1); }
    .menu-items { display: none; list-style: none; margin: 0; padding-left: 10px; }
    .menu-items li { padding: 6px 0; }
    .menu-items li:hover { text-decoration: underline; cursor: pointer; }

    .arrow { transition: transform 0.2s ease; }
    .menu-header.open .arrow { transform: rotate(90deg); }

    .scene-link {
      color: #fff;
      text-decoration: none;
      display: block;
      padding: 6px 8px;
      border-radius: 4px;
    }
    .scene-link:hover { background: rgba(255,255,255,0.1); }
    .scene-link.active { color: #00adee; font-weight: bold; }
  </style>
</head>

<body class="multiple-scenes">
  <div id="pano"></div>

  <div id="sceneList">
    <ul class="scenes">

      <!-- Entrance -->
      <li><a href="#" class="scene-link" data-id="0-entrance">🏛️ Entrance</a></li>

      <!-- Lobby -->
      <li><a href="#" class="scene-link" data-id="5-lobby">🏢 Lobby</a></li>

      <!-- Facilities -->
      <li class="menu-header">💎 Facilities <span class="arrow">►</span></li>
      <ul class="menu-items">
        <li><a class="scene-link" data-id="10-conference-room-1">Conference Room 1</a></li>
        <li><a class="scene-link" data-id="34-conference-room-2">Conference Room 2</a></li>
        <li><a class="scene-link" data-id="3-lounge">Lounge</a></li>
        <li><a class="scene-link" data-id="14-pool">Pool</a></li>
        <li><a class="scene-link" data-id="6-gym">Gym / Yoga</a></li>
      </ul>

      <!-- Room Types -->
      <li class="menu-header">🏨 Room Types <span class="arrow">►</span></li>
      <ul class="menu-items">
        <li><a class="scene-link" data-id="21-studio">Studio</a></li>
        <li><a class="scene-link" data-id="18-1-bedroom-1">1 Bedroom</a></li>
        <li><a class="scene-link" data-id="32-2-bedroom-3">2 Bedrooms</a></li>
        <li><a class="scene-link" data-id="27-3-bedroom">3 Bedrooms</a></li>
      </ul>
    </ul>
  </div>

  <div id="titleBar"><h1 class="sceneName"></h1></div>

  <!-- Toolbar -->
  <a href="javascript:void(0)" id="autorotateToggle"><img class="icon off" src="img/play.png"><img class="icon on" src="img/pause.png"></a>
  <a href="javascript:void(0)" id="fullscreenToggle"><img class="icon off" src="img/fullscreen.png"><img class="icon on" src="img/windowed.png"></a>
  <a href="javascript:void(0)" id="sceneListToggle"><img class="icon off" src="img/expand.png"><img class="icon on" src="img/collapse.png"></a>

  <!-- View Controls -->
  <a href="javascript:void(0)" id="viewUp" class="viewControlButton viewControlButton-1"><img class="icon" src="img/up.png"></a>
  <a href="javascript:void(0)" id="viewDown" class="viewControlButton viewControlButton-2"><img class="icon" src="img/down.png"></a>
  <a href="javascript:void(0)" id="viewLeft" class="viewControlButton viewControlButton-3"><img class="icon" src="img/left.png"></a>
  <a href="javascript:void(0)" id="viewRight" class="viewControlButton viewControlButton-4"><img class="icon" src="img/right.png"></a>
  <a href="javascript:void(0)" id="viewIn" class="viewControlButton viewControlButton-5"><img class="icon" src="img/plus.png"></a>
  <a href="javascript:void(0)" id="viewOut" class="viewControlButton viewControlButton-6"><img class="icon" src="img/minus.png"></a>

  <!-- Core Scripts -->
  <script src="vendor/screenfull.min.js"></script>
  <script src="vendor/bowser.min.js"></script>
  <script src="vendor/marzipano.js"></script>
  <script src="data.js"></script>
  <script src="index.js"></script>

  <!-- Collapsible Menu Logic -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // Collapse all initially
      document.querySelectorAll(".menu-items").forEach(list => list.style.display = "none");

      // Toggle collapse
      document.querySelectorAll(".menu-header").forEach(header => {
        header.addEventListener("click", () => {
          header.classList.toggle("open");
          const next = header.nextElementSibling;
          if (next && next.classList.contains("menu-items")) {
            next.style.display = next.style.display === "block" ? "none" : "block";
          }
        });
      });

      // Scene click logic — keeps Marzipano hotspots
      document.querySelectorAll(".scene-link").forEach(link => {
        link.addEventListener("click", e => {
          e.preventDefault();
          const id = link.dataset.id;
          if (window.findSceneById && window.switchScene) {
            const s = window.findSceneById(id);
            if (s) {
              window.switchScene(s);
              document.querySelectorAll(".scene-link").forEach(l => l.classList.remove("active"));
              link.classList.add("active");
            } else {
              console.warn("Scene not found:", id);
            }
          }
        });
      });
    });
  </script>
</body>
</html>
