<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RV Media | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #0a0a0a; --gold: #c5a059; --text: #b0b3b8; --border: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); padding: 50px 25px; position: fixed; height: 100vh; }
        .sidebar h1 { font-family: 'Merriweather', serif; color: white; margin: 0; font-size: 1.6rem; }
        .main { margin-left: 260px; padding: 60px; width: calc(100% - 260px); }
        .btn-add { background: var(--gold); color: black; padding: 14px 28px; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.3s; }
        .btn-add:hover { background: #e0b462; box-shadow: 0 0 20px rgba(197, 160, 89, 0.3); }
        .data-card { background: rgba(15, 15, 15, 0.7); border: 1px solid var(--border); padding: 35px; border-radius: 8px; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding-bottom: 20px; border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; color: #666; letter-spacing: 1px; }
        td { padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: #0f0f0f; border: 1px solid var(--gold); padding: 45px; width: 450px; border-radius: 4px; text-align: center; }
        .modal-content h2 { color: white; font-family: 'Merriweather', serif; margin-bottom: 30px; }
        .modal-content input, .modal-content select { width: 100%; padding: 14px; margin-bottom: 18px; background: #050505; border: 1px solid #222; color: white; border-radius: 2px; box-sizing: border-box; }
        
        .action-btns { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-edit { background: transparent; border: 1px solid #c5a059; color: #c5a059; padding: 6px 12px; cursor: pointer; font-size: 11px; border-radius: 2px; transition: 0.3s; }
        .btn-edit:hover { background: rgba(197, 160, 89, 0.1); }
        .btn-delete { background: transparent; border: 1px solid #333; color: #ff5f5f; padding: 6px 12px; cursor: pointer; font-size: 11px; border-radius: 2px; transition: 0.3s; }
        .btn-delete:hover { border-color: #ff5f5f; background: rgba(255, 95, 95, 0.1); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>RV MEDIA</h1>
        <p style="font-size:10px; opacity:0.5; text-transform:uppercase; margin-top:10px; letter-spacing: 1px;">Admin Mission Control</p>
        <button onclick="logout()" style="background:transparent; color:#ff5f5f; border:none; padding:0; margin-top:30px; cursor:pointer; font-size:12px; text-transform:uppercase;">Logout</button>
    </div>

    <main class="main">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:white; font-family:Merriweather; font-size:2rem; margin:0;">Active Portfolio</h2>
            <button class="btn-add" onclick="openAddModal()">+ Add New Tour</button>
        </div>

        <div class="data-card">
            <h3 style="color:var(--gold); margin-top:0; font-family:Merriweather;">F&B & Commercial Spaces</h3>
            <table>
                <thead>
                    <tr><th style="width:30%">Project Name</th><th style="width:30%">Description</th><th style="width:20%">Category</th><th style="text-align:right;">Management</th></tr>
                </thead>
                <tbody id="fnb-list"></tbody>
            </table>
        </div>

        <div class="data-card">
            <h3 style="color:var(--gold); margin-top:0; font-family:Merriweather;">Hotels & Residences</h3>
            <table>
                <thead>
                    <tr><th style="width:30%">Project Name</th><th style="width:30%">Description</th><th style="width:20%">Category</th><th style="text-align:right;">Management</th></tr>
                </thead>
                <tbody id="hospitality-list"></tbody>
            </table>
        </div>
        
        <div class="data-card" id="uncategorized-card" style="display:none; border-color:#ff5f5f;">
            <h3 style="color:#ff5f5f; margin-top:0; font-family:Merriweather;">Uncategorized (Please Edit)</h3>
            <table>
                <tbody id="uncategorized-list"></tbody>
            </table>
        </div>
    </main>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <h2>New Virtual Tour</h2>
            <input type="text" id="addName" placeholder="Project Name (e.g. La Villa)">
            <input type="text" id="addDesc" placeholder="Short Description (e.g. Elegant outdoor dining)">
            <select id="addCat">
                <option value="" disabled selected>Target Section</option>
                <option value="fnb">F&B & Commercial</option>
                <option value="hospitality">Hotels & Residences</option>
            </select>
            <input type="text" id="addLink" placeholder="Iframe / 360 URL">
            <button class="btn-add" onclick="saveNewTour()" style="width:100%;">Upload to Database</button>
            <button onclick="closeAddModal()" style="background:transparent; color:#555; border:none; margin-top:20px; cursor:pointer; font-size: 12px;">Cancel</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>Edit Virtual Tour</h2>
            <input type="hidden" id="editId">
            <input type="text" id="editName" placeholder="Project Name">
            <input type="text" id="editDesc" placeholder="Short Description">
            <select id="editCat">
                <option value="fnb">F&B & Commercial</option>
                <option value="hospitality">Hotels & Residences</option>
            </select>
            <input type="text" id="editLink" placeholder="Iframe / 360 URL">
            <button class="btn-add" onclick="updateTour()" style="width:100%;">Save Changes</button>
            <button onclick="closeEditModal()" style="background:transparent; color:#555; border:none; margin-top:20px; cursor:pointer; font-size: 12px;">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (sessionStorage.getItem('rv_logged_in') !== 'true') {
            const access = prompt("Admin Password Required:");
            if (access === "RV2026") {
                sessionStorage.setItem('rv_logged_in', 'true');
            } else {
                alert("Access Denied.");
                window.location.href = "index.html";
            }
        }

        function logout() {
            sessionStorage.removeItem('rv_logged_in');
            window.location.reload();
        }

        const SUPABASE_URL = 'https://tpogoopemznyjrgsixgc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_AMxCk6JgosFA08otpKPypg_nU36V_6h';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentTours = [];
        let activeTable = 'tours'; 

        async function fetchTours() {
            let res = await supabaseClient.from('tours').select('*').order('id', { ascending: true });
            
            if (res.error && res.error.message.includes('does not exist')) {
                activeTable = 'Virtual Tours';
                res = await supabaseClient.from(activeTable).select('*').order('id', { ascending: true });
            }

            if (res.error) {
                alert("SUPABASE ERROR:\n\n" + res.error.message);
                return;
            }

            currentTours = res.data || []; 

            const fnbList = document.getElementById('fnb-list');
            const hospList = document.getElementById('hospitality-list');
            const uncatList = document.getElementById('uncategorized-list');
            const uncatCard = document.getElementById('uncategorized-card');
            
            fnbList.innerHTML = '';
            hospList.innerHTML = '';
            uncatList.innerHTML = '';
            let hasUncat = false;

            if (currentTours.length === 0) {
                fnbList.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; opacity:0.3;">No tours found. Try adding one!</td></tr>';
                hospList.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; opacity:0.3;">No tours found. Try adding one!</td></tr>';
                uncatCard.style.display = 'none';
                return;
            }

            currentTours.forEach(t => {
                const tName = t.Name || t.name;
                const tDesc = t.Description || t.description || "<i style='opacity:0.5'>None</i>";
                const tCat = t.Category || t.category;
                const tId = t.ID || t.id;

                const safeCategory = (tCat || "").toLowerCase().trim();

                const rowHTML = `
                    <tr>
                        <td style="color:white; font-weight:600;">${tName}</td>
                        <td style="color:#888; font-size:12px;">${tDesc}</td>
                        <td><span style="color:var(--gold); text-transform:uppercase; font-size:11px; letter-spacing:1px;">${tCat}</span></td>
                        <td style="text-align:right;">
                            <div class="action-btns">
                                <button class="btn-edit" onclick="openEditModal('${tId}')">Edit</button>
                                <button class="btn-delete" onclick="deleteTour('${tId}')">Remove</button>
                            </div>
                        </td>
                    </tr>
                `;

                if (safeCategory === 'fnb') { fnbList.innerHTML += rowHTML; } 
                else if (safeCategory === 'hospitality') { hospList.innerHTML += rowHTML; } 
                else { uncatList.innerHTML += rowHTML; hasUncat = true; }
            });

            uncatCard.style.display = hasUncat ? 'block' : 'none';
        }

        async function saveNewTour() {
            const Name = document.getElementById('addName').value;
            const Description = document.getElementById('addDesc').value;
            const Category = document.getElementById('addCat').value;
            const Link = document.getElementById('addLink').value;

            if (!Name || !Category || !Link) { alert("Please fill Name, Category, and Link."); return; }

            const { error } = await supabaseClient.from(activeTable).insert([{ Name, Description, Category, Link }]);
            
            if (error) alert("Upload failed: " + error.message);
            else {
                document.getElementById('addName').value = '';
                document.getElementById('addDesc').value = '';
                document.getElementById('addLink').value = '';
                closeAddModal();
                fetchTours();
            }
        }

        function openEditModal(id) {
            const tourToEdit = currentTours.find(t => String(t.ID || t.id) === String(id));
            if (!tourToEdit) return;

            document.getElementById('editId').value = tourToEdit.ID || tourToEdit.id;
            document.getElementById('editName').value = tourToEdit.Name || tourToEdit.name;
            document.getElementById('editDesc').value = tourToEdit.Description || tourToEdit.description || '';
            
            const safeCat = (tourToEdit.Category || tourToEdit.category || "").toLowerCase().trim();
            document.getElementById('editCat').value = (safeCat === 'fnb' || safeCat === 'hospitality') ? safeCat : 'fnb';
            
            document.getElementById('editLink').value = tourToEdit.Link || tourToEdit.link;
            document.getElementById('editModal').style.display = 'flex';
        }

        async function updateTour() {
            const id = document.getElementById('editId').value;
            const Name = document.getElementById('editName').value;
            const Description = document.getElementById('editDesc').value;
            const Category = document.getElementById('editCat').value;
            const Link = document.getElementById('editLink').value;

            const { error } = await supabaseClient.from(activeTable)
                .update({ Name, Description, Category, Link })
                .eq('ID', id);

            if (error) {
                const retry = await supabaseClient.from(activeTable).update({ Name, Description, Category, Link }).eq('id', id);
                if (retry.error) alert("Update failed: " + retry.error.message);
                else { closeEditModal(); fetchTours(); }
            } else {
                closeEditModal(); fetchTours();
            }
        }

        async function deleteTour(id) {
            if (confirm("Permanently remove this tour from the website?")) {
                const { error } = await supabaseClient.from(activeTable).delete().eq('ID', String(id));
                if (error) {
                    const retry = await supabaseClient.from(activeTable).delete().eq('id', String(id));
                    if (retry.error) alert("Delete failed: " + retry.error.message);
                    else fetchTours();
                } else {
                    fetchTours();
                }
            }
        }

        function openAddModal() { document.getElementById('addModal').style.display = 'flex'; }
        function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }
        function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

        window.onload = fetchTours;
    </script>
</body>
</html>
